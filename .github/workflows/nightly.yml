name: Nightly Checks

on:
  schedule:
    # Run at midnight UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:

# Define permissions at workflow level
permissions:
  contents: write
  issues: write

# Cancel in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Force Node.js 24 to avoid deprecation warnings (Node 20 will be removed Sep 2026)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHON_VERSION: '3.11'

jobs:
  # Update dependencies
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install ".[neural,dev]"

    - name: Check for outdated packages
      id: outdated
      run: |
        pip list --outdated --format=json > outdated.json
        cat outdated.json
        # Set output for GitHub status
        if [ -s outdated.json ] && [ "$(cat outdated.json)" != "[]" ]; then
          echo "has_outdated=true" >> $GITHUB_OUTPUT
        else
          echo "has_outdated=false" >> $GITHUB_OUTPUT
        fi
      shell: bash

    - name: Security audit
      run: |
        pip install pip-audit
        pip-audit --desc --format=json > audit.json
        cat audit.json

    - name: Upload security reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: nightly-security-reports
        path: |
          outdated.json
          audit.json
        retention-days: 30

    - name: Create issue if vulnerabilities found
      if: hashFiles('audit.json') != ''
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          try {
            const audit = JSON.parse(fs.readFileSync('audit.json', 'utf8'));

            if (audit.vulnerabilities && audit.vulnerabilities.length > 0) {
              const body = `## 🔒 Security Vulnerabilities Detected

              Found ${audit.vulnerabilities.length} vulnerabilities in rag-memory-plugin:

              ${audit.vulnerabilities.map(v => `### ${v.name}
              - Affected versions: ${v.versions.join(', ')}
              - Fixed in: ${v.fix_versions.join(', ')}

              Details: ${v.description || 'No description available'}
              `).join('\n')}

              **Severity:** ${vulnerabilities.some(v => v.id.includes('HIGH')) ? '⚠️ HIGH' : '⚡ MEDIUM'}

              **Recommendation:**
              Run \`pip install --upgrade\` to update to the latest secure versions.

              ---
              *This issue was automatically generated by the Nightly Checks workflow.*`;

              // Check for existing open security issues
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'security,dependencies'
              });

              // Close old security issues
              for (const issue of issues) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed'
                });
              }

              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔒 Security Vulnerabilities Detected (${new Date().toISOString().split('T')[0]})`,
                body: body,
                labels: ['security', 'dependencies', 'automated']
              });
            }
          } catch (error) {
            console.error('Error processing security report:', error);
          }

  # Test installation from git
  test-git-installation:
    name: Test Git Installation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Test install from git
      run: |
        python3 -m venv test-venv
        source test-venv/bin/activate
        pip install 'git+https://github.com/favouraka/rag-memory-plugin.git#egg=rag-memory-plugin[neural]'

    - name: Verify installation
      run: |
        source test-venv/bin/activate
        rag-memory --version
        rag-memory doctor

  # Test installation script
  test-install-script:
    name: Test Installation Script
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install script dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y curl

    - name: Test install script
      run: |
        bash install.sh

    - name: Verify installation
      run: |
        source ~/.bashrc
        rag-memory --version
        ~/.rag-memory/bin/rag-memory --version
        ~/.rag-memory/bin/rag-memory doctor

  # Documentation check
  check-documentation:
    name: Check Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install docutils markdown-link-check

    - name: Check README.md links
      run: |
        find-links README.md

    - name: Check installation script syntax
      run: |
        bash -n install.sh
        bash -n migrate_to_new_venv.sh

    - name: Check migration script syntax
      run: |
        python3 -m py_compile migrate_from_rag_system.py

    - name: Validate README.md structure
      run: |
        python3 << 'EOF'
        from pathlib import Path

        readme = Path("README.md")
        content = readme.read_text()

        checks = {
            "Installation section": "## 🚀 Installation" in content,
            "Quick start": "## 📚 Quick Start" in content,
            "Command reference": "## 💻 Command Reference" in content,
            "Migration link": "MIGRATION.md" in content,
            "GitHub badge": "github.com" in content.lower(),
        }

        for check, passed in checks.items():
            status = "✅" if passed else "❌"
            print(f"{status} {check}")
        EOF

  # Report summary
  nightly-summary:
    name: Nightly Summary
    runs-on: ubuntu-latest
    needs: [update-dependencies, test-git-installation, test-install-script, check-documentation]
    if: ${{ always() }}

    steps:
    - name: Generate summary
      run: |
        echo "# 🌙 Nightly Checks Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Results" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Dependency check completed" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Git installation tested" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Installation script tested" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Documentation validated" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
        echo "- Review security reports" >> $GITHUB_STEP_SUMMARY
        echo "- Update dependencies if needed" >> $GITHUB_STEP_SUMMARY
