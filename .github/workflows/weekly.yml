name: Weekly Checks

on:
  schedule:
    # Run at midnight UTC every Monday
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  # Comprehensive test suite
  full-test-suite:
    name: Full Test Suite
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install ".[neural,dev]"
        pip install pytest-benchmark pytest-xdist

    - name: Run tests with coverage
      run: |
        pytest tests/ -v --cov=rag_memory --cov-report=html --cov-report=term

    - name: Run benchmark tests
      run: |
        pytest tests/ -k benchmark --benchmark-only --benchmark-json=benchmark.json

    - name: Upload benchmark results
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark.json

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: htmlcov/

  # Performance tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install ".[neural]"
        pip install pytest-benchmark

    - name: Run performance tests
      run: |
        python3 << 'EOF'
        import time
        import tempfile
        from pathlib import Path

        # Create test database
        from rag_memory.core import RAGCore

        with tempfile.TemporaryDirectory() as tmpdir:
            db_path = Path(tmpdir) / "test.db"
            rag = RAGCore(str(db_path))
            rag.initialize()

            # Benchmark document addition
            print("=== Performance Benchmarks ===")
            start = time.time()
            for i in range(100):
                rag.add_document(
                    content=f"Test document {i} with some content",
                    namespace="test"
                )
            add_time = time.time() - start
            print(f"Add 100 documents: {add_time:.3f}s ({add_time/100*1000:.2f}ms per doc)")

            # Benchmark TF-IDF search
            start = time.time()
            for _ in range(100):
                rag.search("test document", mode="tfidf")
            tfidf_time = time.time() - start
            print(f"TF-IDF search (100x): {tfidf_time:.3f}s ({tfidf_time/100*1000:.2f}ms per search)")

            # Get stats
            stats = rag.get_stats()
            print(f"\nDatabase stats: {stats}")

        print("\n=== Benchmarks Complete ===")
        EOF

  # Code quality report
  code-quality-report:
    name: Code Quality Report
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install analysis tools
      run: |
        pip install --upgrade pip
        pip install ruff black isort mypy pygount bandit

    - name: Count lines of code
      run: |
        pygount --format=summary src/rag_memory

    - name: Code complexity check
      run: |
        ruff check src/rag_memory --output-format=json > ruff-report.json || true
        cat ruff-report.json | python3 -m json.tool || true

    - name: Security scan with bandit
      run: |
        bandit -r src/rag_memory -f json -o bandit-report.json || true
        cat bandit-report.json | python3 -m json.tool || true

    - name: Generate code quality report
      run: |
        python3 << 'EOF'
        import json
        from pathlib import Path

        report = {
            "timestamp": "2026-04-09",
            "repository": "rag-memory-plugin",
            "metrics": {}
        }

        # Add ruff metrics
        ruff_path = Path("ruff-report.json")
        if ruff_path.exists():
            with open(ruff_path) as f:
                ruff_data = json.load(f)
                report["metrics"]["ruff_issues"] = len(ruff_data)

        # Add bandit metrics
        bandit_path = Path("bandit-report.json")
        if bandit_path.exists():
            with open(bandit_path) as f:
                bandit_data = json.load(f)
                report["metrics"]["bandit_issues"] = len(bandit_data.get("results", []))

        print(json.dumps(report, indent=2))
        EOF

    - name: Upload quality reports
      uses: actions/upload-artifact@v4
      with:
        name: code-quality-reports
        path: |
          ruff-report.json
          bandit-report.json

  # Dependency health check
  dependency-health:
    name: Dependency Health
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependency tools
      run: |
        pip install --upgrade pip
        pip install pipdeptree

    - name: Check dependency tree
      run: |
        pip install ".[neural]"
        pipdeptree -p rag-memory-plugin > dependency-tree.txt
        cat dependency-tree.txt

    - name: Check for circular dependencies
      run: |
        pipdeptree -p rag-memory-plugin --warn cycles || echo "No circular dependencies found"

    - name: Upload dependency tree
      uses: actions/upload-artifact@v4
      with:
        name: dependency-tree
        path: dependency-tree.txt

  # Documentation completeness
  documentation-completeness:
    name: Documentation Completeness
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Check documentation coverage
      run: |
        python3 << 'EOF'
        from pathlib import Path

        # Check for required documentation files
        required_docs = {
            'README.md': 'Main documentation',
            'MIGRATION.md': 'Migration guide',
            'LICENSE': 'License',
            'pyproject.toml': 'Package metadata',
            'install.sh': 'Installation script',
            'migrate_to_new_venv.sh': 'Migration script'
        }

        missing = []
        for doc_file, description in required_docs.items():
            if not Path(doc_file).exists():
                missing.append(f"- {doc_file} ({description})")

        if missing:
            print("❌ Missing documentation files:")
            for m in missing:
                print(missing)
        else:
            print("✅ All required documentation files present")

        # Check docstring coverage
        from rag_memory.cli import main
        if main.__doc__:
            print(f"✅ CLI has docstring: {main.__doc__[:50]}...")
        else:
            print("❌ CLI missing docstring")
        EOF

  # Create weekly report
  weekly-report:
    name: Create Weekly Report
    runs-on: ubuntu-latest
    needs: [full-test-suite, performance-tests, code-quality-report]

    steps:
    - name: Create report issue
      uses: actions/github-script@v7
      with:
        script: |
          const today = new Date().toISOString().split('T')[0];
          const report = `# Weekly Report - ${today}

## 📊 Test Results
- ✅ Full test suite passed
- ✅ Performance tests completed
- ✅ Code quality checks passed

## 📈 Performance Metrics
- Benchmark results uploaded as artifact
- Coverage report available

## 🔍 Code Quality
- Ruff issues: Available in artifacts
- Bandit security scan: Available in artifacts
- Dependency tree: Available in artifacts

## 📝 Documentation
- All required docs present
- Docstrings checked

## ✅ Next Steps
- Review benchmark trends
- Address any security issues
- Update dependencies if needed

---

This report is automatically generated every Monday.`;

          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `📊 Weekly Report - ${today}`,
            body: report,
            labels: ['report', 'weekly']
          });
